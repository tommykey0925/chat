apiVersion: v1
kind: ConfigMap
metadata:
  name: chat-api-config
  namespace: chat
data:
  SPRING_DATASOURCE_URL: jdbc:postgresql://DB_HOST_PLACEHOLDER:5432/chat
  SPRING_DATASOURCE_USERNAME: chat
  SPRING_DATA_REDIS_HOST: REDIS_HOST_PLACEHOLDER
  SPRING_DATA_REDIS_PORT: "6379"
  AWS_REGION: ap-northeast-1
  APP_S3_BUCKET: BUCKET_PLACEHOLDER
  APP_SQS_QUEUE_URL: SQS_URL_PLACEHOLDER
  COGNITO_ISSUER_URI: COGNITO_ISSUER_PLACEHOLDER
  COGNITO_USER_POOL_ID: COGNITO_POOL_PLACEHOLDER
  COGNITO_CLIENT_ID: COGNITO_CLIENT_PLACEHOLDER
