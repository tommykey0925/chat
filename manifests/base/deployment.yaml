apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-api
  namespace: chat
  labels:
    app: chat-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-api
  template:
    metadata:
      labels:
        app: chat-api
    spec:
      serviceAccountName: chat-api
      containers:
        - name: chat-api
          image: chat-api
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: chat-api-config
          env:
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: chat-api-secret
                  key: db-password
            - name: CF_KEY_PAIR_ID
              valueFrom:
                secretKeyRef:
                  name: cf-signing-key
                  key: key-pair-id
                  optional: true
          volumeMounts:
            - name: cf-signing-key
              mountPath: /etc/cf-signing
              readOnly: true
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: cf-signing-key
          secret:
            secretName: cf-signing-key
            optional: true
