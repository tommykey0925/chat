name: CD

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "web/**"

env:
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY: chat-api

permissions:
  contents: write

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          cd api
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$GITHUB_SHA .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$GITHUB_SHA

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: flox/install-flox-action@main

      - name: Update manifest image tag
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: flox activate -- bash -c 'cd manifests/base && kustomize edit set image chat-api=$ECR_REGISTRY/$ECR_REPOSITORY:$GITHUB_SHA'

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifests/base/kustomization.yaml
          git commit -m "deploy: update chat-api image to $GITHUB_SHA"
          git push

  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: flox/install-flox-action@main

      - name: Build web
        run: flox activate -- bash -c 'cd web && pnpm install --frozen-lockfile && pnpm build'

      - name: Deploy to S3
        run: aws s3 sync web/build/ s3://${{ secrets.FRONTEND_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
