name: CD

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "web/**"
      - "infra/**"
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY: chat-api

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'infra/') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Apply
        run: |
          cd infra
          terraform init
          terraform apply -input=false -auto-approve

  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          cd api
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:prod .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:prod

  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: flox/install-flox-action@main

      - name: Build web
        env:
          VITE_COGNITO_USER_POOL_ID: ap-northeast-1_qPedGpbby
          VITE_COGNITO_CLIENT_ID: 7vsovq6esg1am78jmk3diucc3q
        run: flox activate -- bash -c 'cd web && pnpm install --frozen-lockfile && pnpm build'

      - name: Deploy to S3
        run: aws s3 sync web/build/ s3://${{ secrets.FRONTEND_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
