name: CD

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "web/**"
      - "infra/**"
      - "lambda/**"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY: chat-api

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'infra/') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Lambda thumbnail
        run: |
          cd lambda/thumbnail
          npm ci
          zip -r ../../infra/lambda-thumbnail.zip .

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Plan
        run: |
          cd infra
          terraform init
          terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        run: |
          cd infra
          terraform apply tfplan

  deploy-api:
    needs: deploy-infra
    if: always() && (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          cd api
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:prod .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:prod
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $ECR_REGISTRY/$ECR_REPOSITORY:prod | cut -d'@' -f2)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Update kustomization with new digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          cd manifests/base
          kustomize edit set image chat-api=$ECR_REGISTRY/$ECR_REPOSITORY@$DIGEST

      - name: Create PR for manifest update
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifests/base/kustomization.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          BRANCH="auto/update-manifest-$(date +%Y%m%d%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "build: automatic update of chat"
          git push origin "$BRANCH"
          gh pr create --title "build: automatic update of chat" --body "Automated manifest update by CD pipeline." --base main --head "$BRANCH"
          gh pr merge "$BRANCH" --auto --delete-branch

  deploy-web:
    needs: deploy-infra
    if: always() && (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build web
        env:
          VITE_COGNITO_USER_POOL_ID: ap-northeast-1_qPedGpbby
          VITE_COGNITO_CLIENT_ID: 7vsovq6esg1am78jmk3diucc3q
        run: cd web && pnpm install --frozen-lockfile && pnpm build

      - name: Deploy to S3
        run: aws s3 sync web/build/ s3://${{ secrets.FRONTEND_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
