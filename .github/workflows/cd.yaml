name: CD

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "web/**"
      - "infra/**"
      - "lambda/**"
  workflow_dispatch:

permissions:
  contents: write

env:
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY: chat-api

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'infra/**'
              - 'lambda/**'

  deploy-infra:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.infra == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Lambda thumbnail
        run: |
          cd lambda/thumbnail
          npm ci
          zip -r ../../infra/lambda-thumbnail.zip .

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Plan
        env:
          TF_VAR_github_token: ${{ secrets.GH_PAT }}
        run: |
          cd infra
          terraform init
          terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        env:
          TF_VAR_github_token: ${{ secrets.GH_PAT }}
        run: |
          cd infra
          terraform apply tfplan

  deploy-api:
    needs: [detect-changes, deploy-infra]
    if: always() && (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          cd api
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:prod .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:prod
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $ECR_REGISTRY/$ECR_REPOSITORY:prod | cut -d'@' -f2)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Update kustomization with new digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          cd manifests/base
          kustomize edit set image chat-api=$ECR_REGISTRY/$ECR_REPOSITORY@$DIGEST

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Create PR for manifest update
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifests/base/kustomization.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          BRANCH="auto/update-manifest-$(date +%Y%m%d%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "build: automatic update of chat"
          git push origin "$BRANCH"
          gh pr create --title "build: automatic update of chat" --body "Automated manifest update by CD pipeline." --base main --head "$BRANCH"
          gh pr merge "$BRANCH" --auto

  deploy-web:
    needs: [detect-changes, deploy-infra]
    if: always() && (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Get deployment parameters from SSM
        id: params
        run: |
          echo "cloudfront_id=$(aws ssm get-parameter --name /chat/cloudfront-distribution-id --query 'Parameter.Value' --output text)" >> $GITHUB_OUTPUT
          echo "frontend_bucket=$(aws ssm get-parameter --name /chat/frontend-bucket --query 'Parameter.Value' --output text)" >> $GITHUB_OUTPUT
          echo "cognito_user_pool_id=$(aws ssm get-parameter --name /chat/cognito-user-pool-id --query 'Parameter.Value' --output text)" >> $GITHUB_OUTPUT
          echo "cognito_client_id=$(aws ssm get-parameter --name /chat/cognito-client-id --query 'Parameter.Value' --output text)" >> $GITHUB_OUTPUT

      - name: Build web
        env:
          VITE_COGNITO_USER_POOL_ID: ${{ steps.params.outputs.cognito_user_pool_id }}
          VITE_COGNITO_CLIENT_ID: ${{ steps.params.outputs.cognito_client_id }}
        run: cd web && pnpm install --frozen-lockfile && pnpm build

      - name: Deploy to S3
        run: aws s3 sync web/build/ s3://${{ steps.params.outputs.frontend_bucket }} --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ steps.params.outputs.cloudfront_id }} --paths "/*"
