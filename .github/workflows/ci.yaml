name: CI

on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Run API tests
        run: cd api && ./gradlew test

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build web
        run: cd web && pnpm install --frozen-lockfile && pnpm build

  e2e-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: cd web && pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: cd web && pnpm exec playwright install --with-deps chromium

      - name: Build and run E2E tests
        env:
          VITE_COGNITO_USER_POOL_ID: ap-northeast-1_DummyPool
          VITE_COGNITO_CLIENT_ID: dummyclientid0000000000000
        run: cd web && pnpm build && pnpm test:e2e

  terraform-plan:
    runs-on: ubuntu-latest
    env:
      TF_VAR_github_token: ${{ secrets.GH_PAT }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Check shared infra exists
        id: shared
        run: |
          VPC=$(aws ec2 describe-vpcs --filters Name=tag:Name,Values=shared-vpc \
                  --query 'Vpcs[0].VpcId' --output text 2>/dev/null || true)
          if [ -n "$VPC" ] && [ "$VPC" != "None" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::shared-vpc not found, skipping terraform plan (chat の data source は infra-shared に依存しているため)"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.shared.outputs.exists == 'true'
        with:
          version: 10

      - uses: actions/setup-node@v4
        if: steps.shared.outputs.exists == 'true'
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: lambda/thumbnail/pnpm-lock.yaml

      - name: Install Lambda thumbnail deps
        if: steps.shared.outputs.exists == 'true'
        run: |
          cd lambda/thumbnail
          pnpm install --frozen-lockfile --prod

      - uses: tommykey-apps/.github/.github/actions/terraform-plan@v1
        if: steps.shared.outputs.exists == 'true'
        with:
          working-directory: infra
