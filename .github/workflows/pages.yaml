name: Deploy Swagger UI to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "api/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: flox/install-flox-action@main

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('api/build.gradle.kts', 'api/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Generate OpenAPI spec
        run: flox activate -- bash -c 'cd api && gradle test --tests "com.example.chat.integration.OpenApiSpecTest"'

      - name: Prepare Pages content
        run: |
          mkdir -p _site
          cp docs/swagger/index.html _site/
          cp api/build/openapi/openapi.json _site/

      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
