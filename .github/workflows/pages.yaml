name: Deploy Swagger UI to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "docs/db/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Generate OpenAPI spec
        run: cd api && ./gradlew test --tests "com.example.chat.integration.OpenApiSpecTest"

      - name: Prepare Pages content
        run: |
          mkdir -p _site
          cp docs/swagger/index.html _site/
          cp api/build/openapi/openapi.json _site/

      # Jekyll で docs/db/ を HTML 化 (tbls 出力 Markdown を Pages 上で読める形に)
      - uses: actions/configure-pages@v5
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs/db
          destination: ./_jekyll_db

      - name: Merge db docs into _site
        run: cp -r _jekyll_db _site/db

      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
